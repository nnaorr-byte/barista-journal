/* ===== טוקנים — מתוך DESIGN.md של האפליקציה (מצב כהה, מחויב) ===== */
:root{
  --bg:#190e06; --bg-elevated:#2a1b10; --bg-input:#1e1209;
  --card-grad:linear-gradient(178deg,rgba(255,190,120,.05) 0%,transparent 30%),linear-gradient(180deg,#291a10 0%,#23150c 100%);
  --border-soft:rgba(255,200,140,.14); --hairline:rgba(255,214,160,.15);
  --text:#f6ead8; --muted:#c2a582; --accent:#e8a960; --accent-strong:#ffcf95; --crema:#ffe3bd;
  --good:#93c47f; --warn:#e0b45e;
  --glass:linear-gradient(160deg,rgba(255,190,110,.30),rgba(255,160,80,.10));
  --glass-border:rgba(255,208,148,.45); --glass-ink:#ffe6c2;
  --glow:rgba(255,178,96,.35);
  --r:16px; --r-sm:12px;
  --spring:cubic-bezier(.22,1,.36,1);
  --ph-scale:.8;
}
@media (max-width:560px){ :root{ --ph-scale:calc((100vw - 44px)/417); } }
*{box-sizing:border-box}
body{
  margin:0; padding:0 0 48px;
  background:
    radial-gradient(55% 32% at 85% 0%, rgba(255,176,96,.14) 0%, transparent 70%),
    radial-gradient(45% 28% at 8% 100%, rgba(255,140,80,.07) 0%, transparent 70%),
    #190e06;
  color:var(--text);
  font-family:'Heebo',-apple-system,'Segoe UI',Arial,sans-serif;
  line-height:1.55;
}
/* ===== כותרת הדף ===== */
.stage-head{max-width:1440px;margin:0 auto;padding:36px 24px 8px;text-align:center}
.stage-head h1{margin:0;font-size:1.6rem;font-weight:800;color:var(--crema);letter-spacing:-.2px;text-wrap:balance}
.stage-head p{margin:6px auto 0;color:var(--muted);font-size:.95rem;max-width:52ch}
.assump{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px auto 0;max-width:900px}
.assump span{font-size:.78rem;color:var(--muted);border:1px dashed var(--border-soft);border-radius:999px;padding:4px 12px}
/* ===== במת הטלפונים ===== */
.phones{display:flex;flex-wrap:wrap;gap:8px 24px;justify-content:center;align-items:flex-start;max-width:1440px;margin:20px auto 0;padding:0 12px}
figure.ph{margin:0;display:flex;flex-direction:column;align-items:center;width:calc(417px * var(--ph-scale))}
.ph-scale{transform:scale(var(--ph-scale));transform-origin:top center;height:calc(876px * var(--ph-scale))}
figcaption{margin-top:14px;text-align:center;max-width:34ch}
figcaption b{display:block;color:var(--accent-strong);font-size:.95rem}
figcaption span{color:var(--muted);font-size:.82rem}
/* ===== מסגרת iPhone — מידות מדויקות מ-ios_frame.jsx ===== */
.iphone{display:inline-block;padding:12px;background:#000;border-radius:60px;box-shadow:0 0 0 2px #1f2937,0 20px 60px rgba(0,0,0,.35)}
.iphone .scr{position:relative;width:393px;height:852px;border-radius:48px;overflow:hidden;background:var(--bg)}
.iphone .statusbar{position:absolute;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;font-size:16px;font-weight:600;color:#fff;z-index:20;pointer-events:none;direction:ltr}
.iphone .island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:124px;height:36px;background:#000;border-radius:999px;z-index:30}
.iphone .sig{display:flex;align-items:flex-end;gap:2px;height:12px}
.iphone .sig i{width:3px;background:currentColor;border-radius:1px;display:block}
.iphone .batt{width:26px;height:12px;border:1.5px solid currentColor;border-radius:3px;padding:1px;opacity:.8;position:relative}
.iphone .batt i{display:block;width:85%;height:100%;background:currentColor;border-radius:1px;opacity:.9}
.iphone .batt::after{content:'';position:absolute;top:3px;right:-3px;width:2px;height:6px;background:currentColor;border-radius:0 1px 1px 0}
.iphone .sicons{display:flex;align-items:center;gap:6px}
.iphone .content{position:absolute;top:54px;left:0;right:0;bottom:34px;overflow:hidden}
.iphone .homebar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:140px;height:5px;background:rgba(255,255,255,.5);border-radius:999px;z-index:10}
/* ===== שפת האפליקציה בתוך המסך ===== */
.screen{position:absolute;inset:0;display:none;flex-direction:column}
.screen.active{display:flex;animation:scr-in .26s var(--spring)}
@keyframes scr-in{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
.screen.back-anim{animation:scr-back .26s var(--spring)}
@keyframes scr-back{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
.app-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.app-top h2{margin:0;font-size:1.15rem;font-weight:800;color:var(--crema);display:flex;align-items:center;gap:8px}
.app-scroll{flex:1;overflow-y:auto;padding:0 14px 12px;scrollbar-width:none}
.app-scroll::-webkit-scrollbar{display:none}
.greet .g1{font-size:1.1rem;font-weight:800;color:var(--crema)}
.greet .g2{font-size:.82rem;color:var(--muted);margin-bottom:12px}
.card{background:var(--card-grad);border:1px solid var(--border-soft);border-top-color:var(--hairline);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.4),0 6px 18px rgba(0,0,0,.28)}
.card h3{margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--hairline);font-size:.98rem;font-weight:700;color:var(--crema);display:flex;align-items:center;gap:7px}
.card h3 svg{color:var(--accent);flex:none}
.muted{color:var(--muted);font-size:.82rem}
/* כרטיס הסיכום השבועי (וריאציה A) */
.week-card{cursor:pointer;border-color:color-mix(in srgb,var(--accent) 55%,var(--border-soft));box-shadow:0 1px 2px rgba(0,0,0,.4),0 0 22px color-mix(in srgb,var(--glow) 55%,transparent);transition:transform .15s var(--spring)}
.week-card:active{transform:scale(.98)}
.week-row{display:flex;align-items:center;gap:12px}
.spark{display:flex;align-items:flex-end;gap:4px;height:40px;flex:none}
.spark i{width:9px;border-radius:3px 3px 1px 1px;background:linear-gradient(180deg,var(--accent-strong),var(--accent));display:block;min-height:4px}
.spark i.z{background:var(--bg-elevated);border:1px solid var(--border-soft)}
.week-kpi{flex:1}
.week-kpi .n{font-size:1.25rem;font-weight:800;color:var(--accent-strong);font-variant-numeric:tabular-nums}
.week-kpi .up{color:var(--good);font-size:.85rem;font-weight:700}
.week-kpi .l{font-size:.78rem;color:var(--muted)}
.chev{color:var(--muted);flex:none;transform:rotate(90deg)}
/* באנר שקט (וריאציה C) */
.week-banner{display:flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--accent) 9%,var(--bg-elevated));border:1px dashed color-mix(in srgb,var(--accent) 55%,transparent);border-radius:var(--r-sm);padding:10px 12px;margin-bottom:12px;font-size:.86rem;color:var(--crema);cursor:pointer}
.week-banner svg{color:var(--accent-strong);flex:none}
.week-banner b{font-variant-numeric:tabular-nums}
/* אריחי סטטיסטיקה */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px}
.tile{background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:var(--r-sm);padding:10px 6px 8px;text-align:center}
.tile .v{font-size:1.3rem;font-weight:800;color:var(--accent-strong);font-variant-numeric:tabular-nums;letter-spacing:-.5px;line-height:1.2}
.tile .l{font-size:.72rem;font-weight:600;color:var(--muted);margin-top:2px}
/* מסך הסיכום המלא */
.wk-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.wk-nav button{background:var(--bg-elevated);border:1px solid var(--border-soft);color:var(--text);width:40px;height:40px;border-radius:12px;font-size:1.1rem;cursor:pointer;font-family:inherit;transition:transform .14s var(--spring)}
.wk-nav button:active{transform:scale(.9)}
.wk-nav .rng{font-weight:700;color:var(--crema);font-size:.95rem}
.ringwrap{display:flex;justify-content:center;margin:4px 0 10px;position:relative}
.ringwrap svg{display:block}
.ringnum{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringnum .n{font-size:2.1rem;font-weight:800;color:var(--accent-strong);font-variant-numeric:tabular-nums;line-height:1}
.ringnum .l{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:4px}
.days{display:flex;align-items:flex-end;gap:8px;height:96px;padding:0 4px;margin:8px 0 2px}
.day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.day i{width:100%;max-width:26px;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,var(--accent-strong),var(--accent));display:block;min-height:5px}
.day i.z{background:var(--bg-elevated);border:1px solid var(--border-soft)}
.day em{font-style:normal;font-size:.72rem;color:var(--muted);font-weight:600}
.bestshot{display:flex;align-items:center;gap:10px;padding:6px 0}
.bs-badge{min-width:42px;height:42px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:var(--good);border:1.5px solid var(--good);background:var(--bg-elevated);font-variant-numeric:tabular-nums}
.insight{display:flex;gap:8px;align-items:flex-start;background:color-mix(in srgb,var(--accent) 9%,var(--bg-elevated));border:1px dashed color-mix(in srgb,var(--accent) 65%,transparent);border-radius:var(--r-sm);padding:10px 12px;font-size:.84rem;color:var(--crema)}
.insight svg{color:var(--accent-strong);flex:none;margin-top:1px}
.btn{display:flex;width:100%;align-items:center;justify-content:center;gap:7px;background:var(--glass);color:var(--glass-ink);border:1px solid var(--glass-border);border-radius:15px;padding:12px 24px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:inset 0 1px 0 rgba(255,226,180,.3);transition:transform .15s var(--spring),box-shadow .3s}
.btn:active{transform:scale(.97)}
.btn:hover{box-shadow:inset 0 1px 0 rgba(255,226,180,.3),0 0 22px var(--glow)}
.backbtn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:4px;padding:6px 0}
.toast{position:absolute;bottom:96px;right:16px;left:16px;background:var(--bg-elevated);border:1px solid var(--glass-border);border-radius:var(--r-sm);padding:10px 14px;font-size:.86rem;color:var(--crema);box-shadow:0 6px 18px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;text-align:center}
.toast.show{opacity:1}
/* ניווט תחתון */
.navbar{flex:none;display:flex;justify-content:space-around;align-items:center;background:color-mix(in srgb,var(--bg-elevated) 88%,transparent);backdrop-filter:blur(14px);border-top:1px solid var(--hairline);padding:7px 4px 9px}

    cons:71, insight:'שבוע יציב אך בלי שיא — כל השוטים בטווח 6–8. שווה לנסות עצירה מוקדמת יותר.' },
];
const DAY_NAMES = ['א','ב','ג','ד','ה','ו','ש'];
const RING_C = 2 * Math.PI * 62;

function summaryHTML(w){
  const total = w.days.reduce((a,b)=>a+b,0);
  const diff = Math.round((w.avg - w.prev)*10)/10;
  const up = diff >= 0;
  const maxD = Math.max(...w.days, 1);
  const bars = w.days.map((n,i)=>`<span class="day"><i class="${n?'':'z'}" style="height:${n? (18 + (n/maxD)*58) : 6}px" title="${n} שוטים"></i><em>${DAY_NAMES[i]}</em></span>`).join('');
  const dash = (w.avg/10)*RING_C;
  return `
    <div class="wk-nav">
      <button data-wk="-1" aria-label="שבוע קודם">‹</button>
      <span class="rng">${w.rng}</span>
      <button data-wk="1" aria-label="שבוע הבא">›</button>
    </div>
    <div class="card">
      <div class="ringwrap">
        <svg width="164" height="164" viewBox="0 0 164 164">
          <circle cx="82" cy="82" r="62" fill="none" stroke="rgba(255,200,140,.14)" stroke-width="9"/>
          <circle cx="82" cy="82" r="62" fill="none" stroke="url(#g${Math.round(w.avg*10)})" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="${dash} ${RING_C}" transform="rotate(-90 82 82)"/>
          <defs><linearGradient id="g${Math.round(w.avg*10)}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ffcf95"/><stop offset="1" stop-color="#e8a960"/>
          </linearGradient></defs>
        </svg>
        <div class="ringnum"><span class="n">${w.avg.toFixed(1)}</span><span class="l">ממוצע שבועי · ${up?'‎↑':'‎↓'}${Math.abs(diff).toFixed(1)}</span></div>
      </div>
      <div class="stat-grid">
        <div class="tile"><div class="v">${total}</div><div class="l">שוטים</div></div>
        <div class="tile"><div class="v">${w.best.r}</div><div class="l">הכי טוב</div></div>
        <div class="tile"><div class="v">${w.cons}</div><div class="l">עקביות</div></div>
        <div class="tile"><div class="v">${w.days.filter(Boolean).length}</div><div class="l">ימים עם קפה</div></div>
      </div>
    </div>
    <div class="card">
      <h3><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 19 V10 M10 19 V5 M16 19 V13 M20 19 H4"/></svg> שוטים לפי יום</h3>
      <div class="days">${bars}</div>
    </div>
    <div class="card">
      <h3><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M7 4 H17 V8 A5 5 0 0 1 7 8 Z"/><path d="M17 5 H19.5 A1.5 1.5 0 0 1 18 8.5 H17"/><path d="M9.5 13 L12 11 L14.5 13"/><path d="M8 17 H16 M10 20 H14"/></svg> השוט של השבוע</h3>
      <div class="bestshot">
        <span class="bs-badge">${w.best.r}</span>
        <span style="flex:1"><span style="display:block">${w.best.bean}</span><span class="muted">${w.best.info}</span></span>
      </div>
    </div>
    <div class="insight" style="margin-bottom:12px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M9.5 18 H14.5 M10.5 21 H13.5"/><path d="M8 14.5 A5.5 5.5 0 1 1 16 14.5 L15 16 H9 Z"/></svg>
      <span>${w.insight}</span>
    </div>
    <button class="btn js-share">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 15 V4 M8.5 7 L12 3.5 L15.5 7"/><path d="M6 11 H5 A1.5 1.5 0 0 0 3.5 12.5 V19 A1.5 1.5 0 0 0 5 20.5 H19 A1.5 1.5 0 0 0 20.5 19 V12.5 A1.5 1.5 0 0 0 19 11 H18"/></svg>
      שתף כתמונה
    </button>`;
}

// state לכל טלפון: אינדקס שבוע
const wkState = { A:0, B:0, C:0 };

function renderSummaries(){
  document.querySelectorAll('[data-phone]').forEach(ph=>{
    const id = ph.dataset.phone;
    ph.querySelectorAll('.js-summary').forEach(el=>{ el.innerHTML = summaryHTML(WEEKS[wkState[id]]); });
  });
}
renderSummaries();

document.addEventListener('click', (e)=>{
  const phone = e.target.closest('[data-phone]');
  if(!phone) return;
  const id = phone.dataset.phone;

  const goto = e.target.closest('[data-goto]');
  if(goto){
    const target = goto.dataset.goto;
    const back = goto.dataset.dir === 'back';
    phone.querySelectorAll('.screen').forEach(s=>{
      const on = s.dataset.screen === target;
      s.classList.toggle('active', on);
      s.classList.toggle('back-anim', on && back);
    });
    return;
  }
  const wk = e.target.closest('[data-wk]');
  if(wk){
    const n = wkState[id] + (wk.dataset.wk === '1' ? -1 : 1); // ‹ = שבוע ישן יותר
    if(n >= 0 && n < WEEKS.length){ wkState[id] = n; renderSummaries(); }
    return;
  }
  if(e.target.closest('.js-share')){
    const t = phone.querySelector('.js-toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }
});
</script>
</body>
</html>
